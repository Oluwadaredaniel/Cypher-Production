name: cypher_pc
description: PC control interface for CYPHER

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  provider: ^6.0.0
  http: ^1.1.0
  shared_preferences: ^2.2.0
  logger: ^2.0.0
  sentry_flutter: ^7.0.0
  google_fonts: ^5.1.0
  window_manager: ^0.3.0
  socket_io_client: ^2.0.3+1
  fl_chart: ^0.63.0
  qr_flutter: ^4.1.0
  nsd: ^2.1.3
  flutter_svg: ^2.0.7
  animate_do: ^3.1.2
  path_provider: ^2.1.1
  package_info_plus: ^4.2.0
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
